<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#0a0a0a" />
  <title>Jera On Air 2026 — Timetable</title>
  <link rel="manifest" href="manifest.webmanifest" />
  <link rel="icon" type="image/png" sizes="192x192" href="icon-192.png" />
  <link rel="apple-touch-icon" href="apple-touch-icon.png" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="JOA Timetable" />
  <meta name="mobile-web-app-capable" content="yes" />
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <header class="app-header">
    <div class="title-row">
      <h1>JERA ON AIR <span class="year">2026</span></h1>
      <div class="header-actions">
        <button id="likedOnlyBtn" class="toggle-btn" aria-pressed="false" title="Toon alleen favorieten">
          <span class="heart">❤</span> <span class="lbl">Alleen favorieten</span>
        </button>
        <button id="viewToggle" class="toggle-btn" title="Wissel weergave">
          <span class="view-lbl">Lijst</span>
        </button>
        <button id="mapBtn" class="toggle-btn" title="Toon festivalkaart" aria-haspopup="dialog">
          <span aria-hidden="true">🗺</span> <span class="lbl">Kaart</span>
        </button>
      </div>
    </div>

    <nav class="day-tabs" id="dayTabs" role="tablist"></nav>

    <div class="stage-filters" id="stageFilters" aria-label="Filter stages"></div>
  </header>

  <main id="main">
    <section id="gridView" class="view grid-view" hidden></section>
    <section id="listView" class="view list-view"></section>
    <p id="emptyMsg" class="empty-msg" hidden>Geen optredens gevonden met deze filters.</p>
  </main>

  <footer class="app-footer">
    <p>Onofficiële fan-app · Data via <a href="https://www.jeraonair.nl/nl/timetable/" target="_blank" rel="noopener">jeraonair.nl</a> · Favorieten worden lokaal in je browser bewaard.</p>
  </footer>

  <div id="mapOverlay" class="map-overlay" role="dialog" aria-modal="true" aria-label="Festivalkaart" hidden>
    <button id="mapCloseBtn" class="map-close" type="button" aria-label="Sluit kaart">×</button>
    <nav class="map-day-tabs" id="mapDayTabs" role="tablist" aria-label="Kies dag"></nav>
    <div class="map-scroll">
      <div class="map-wrap">
        <img src="festival_map.jpg" alt="Jera On Air 2026 festivalkaart" class="map-image" />
        <div class="map-pins" id="mapPins"></div>
      </div>
    </div>
    <aside id="mapStagePanel" class="map-stage-panel" hidden aria-live="polite"></aside>
  </div>

  <script src="data.js"></script>
  <script src="app.js"></script>
  <script>
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('sw.js').catch(() => { /* offline support optional */ });
      });
    }
  </script>
</body>
</html>
